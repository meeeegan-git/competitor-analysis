server {
    listen 80;
    server_name localhost;

    # 前端静态文件（需要密码认证）
    location / {
        auth_basic "请输入访问密码";
        auth_basic_user_file /etc/nginx/.htpasswd;

        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
